        const TRANSLATION_MAP = {
            "at": "horse",
            "kedi": "cat",
            "köpek": "dog",
            "araba": "car",
            "kuş": "bird",
            "ağaç": "tree",
            "çiçek": "flower",
            "ev": "house"
        };

        function SearchPage() {
            const [query, setQuery] = useState("");
            const [activeKeyword, setActiveKeyword] = useState("kedi");
            const [results, setResults] = useState([]);
            const [translatedKeyword, setTranslatedKeyword] = useState("cat");
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });
            const [selectedImageIds, setSelectedImageIds] = useState([]);
            const [isDownloadingZip, setIsDownloadingZip] = useState(false);
            const [downloadProgress, setDownloadProgress] = useState(0);
            const [isIndeterminate, setIsIndeterminate] = useState(false);
            const [hasDownloadError, setHasDownloadError] = useState(false);

            // Seçilen görsellerin ID'lerini tutan state
            const [selectedImageIds, setSelectedImageIds] = useState([]);
            // ZIP indirme durumunu tutan state (UI/UX kontrolleri için)
            const [isDownloadingZip, setIsDownloadingZip] = useState(false);
            // ZIP indirme ilerleme yüzdesini tutan state (Progress Bar için)
            const [downloadProgress, setDownloadProgress] = useState(0);

            // Trigger search initially on load
            useEffect(() => {
                handleSearch("kedi");
            }, []);

            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                }, 3000);
            };

            const handleSearch = (searchWord) => {
                const term = (searchWord !== undefined && searchWord !== null ? searchWord : query).trim();
                if (!term) {
                    showToast("Lütfen bir arama kelimesi girin.", "error");
                    return;
                }

                setIsLoading(true);
                setError(null);
                setActiveKeyword(term);

                fetch("http://127.0.0.1:8000/api/v1/pipeline/search", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ keyword: term })
                })
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`API hatası: ${res.status} ${res.statusText}`);
                    }
                    return res.json();
                })
                .then(data => {
                    setResults(data.results || []);
                    setSelectedImageIds([]); // Arama tamamlandığında önceki seçimleri sıfırla
                    setActiveKeyword(data.search_keyword);
                    setTranslatedKeyword(data.translated_keyword);
                    setIsLoading(false);
                    showToast(`"${data.search_keyword}" araması başarıyla tamamlandı!`);
                })
                .catch(err => {
                    console.error("Arama hatası:", err);
                    setError(err.message || "Arama sırasında API bağlantısı kurulamadı veya sunucu hatası oluştu.");
                    setIsLoading(false);
                    showToast("Arama başarısız oldu.", "error");
                });
            };

            const handleDownload = async (imgId, url) => {
                try {
                    showToast(`Görsel (${imgId}) indiriliyor...`);
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Ağ yanıtı uygun değil.");
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);

                    const link = document.createElement("a");
                    link.href = blobUrl;

                    // Determine file extension
                    let extension = "jpg";
                    const cleanUrl = url.split('?')[0].split('#')[0];
                    const parts = cleanUrl.split('.');
                    if (parts.length > 1) {
                        const ext = parts[parts.length - 1].toLowerCase();
                        if (ext === "jpg" || ext === "jpeg" || ext === "png" || ext === "webp" || ext === "gif") {
                            extension = ext;
                        }
                    }

                    link.download = `${imgId}.${extension}`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);

                    showToast(`Görsel (${imgId}) başarıyla indirildi!`);
                } catch (err) {
                    console.warn("Blob indirme CORS veya ağ hatası nedeniyle yapılamadı, doğrudan link açılıyor...", err);
                    try {
                        const link = document.createElement("a");
                        link.href = url;
                        link.target = "_blank";
                        link.download = `${imgId}.jpg`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        showToast(`CORS engeli: Yeni sekmede açıldı, sağ tıklayıp kaydedebilirsiniz.`);
                    } catch (fallbackErr) {
                        console.error("Yedek indirme başarısız:", fallbackErr);
                        showToast("İndirme başarısız oldu.", "error");
                    }
                }
            };

            // Backend'e POST isteği yapıp ZIP indirmeyi ve getReader() ile ilerleme takibini yapan fonksiyon
            const handleDownloadZip = async () => {
                if (selectedImageIds.length === 0) {
                    showToast("Lütfen indirilecek en az bir görsel seçin.", "error");
                    return;
                }

                setIsDownloadingZip(true);
                setDownloadProgress(0);
                setIsIndeterminate(false);
                setHasDownloadError(false);
                showToast(`${selectedImageIds.length} görsel indirilmek üzere ZIP paketi haline getiriliyor...`);

                try {
                    // Backend DownloadRequest payload yapısı
                    const payload = {
                        image_ids: selectedImageIds
                    };

                    // fetch API ile POST isteği atıp stream olarak okuyoruz
                    const response = await fetch("http://127.0.0.1:8000/download-zip", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let errorMsg = `Sunucu Hatası: ${response.status}`;
                        try {
                            const errData = await response.json();
                            if (errData && errData.detail) {
                                errorMsg = errData.detail;
                            }
                        } catch (e) {
                            // JSON değilse varsayılan mesaj kullanılır
                        }
                        throw new Error(errorMsg);
                    }

                    // Content-Length header'ını alıp doğrula
                    const contentLength = response.headers.get("content-length");
                    let totalBytes = 0;
                    if (contentLength) {
                        totalBytes = parseInt(contentLength, 10);
                    }

                    // Boyut bilgisi yoksa indeterminate loading durumuna geç
                    if (!totalBytes || isNaN(totalBytes)) {
                        setIsIndeterminate(true);
                    }

                    const reader = response.body.getReader();
                    const chunks = [];
                    let receivedBytes = 0;

                    // Akışı parça parça oku
                    while (true) {
                        const { done, value } = await reader.read();

                        if (done) {
                            break;
                        }

                        chunks.push(value);
                        receivedBytes += value.length;

                        if (totalBytes > 0) {
                            const percent = Math.round((receivedBytes / totalBytes) * 100);
                            setDownloadProgress(percent);
                        }
                    }

                    // Chunk'ları birleştirip Blob oluştur
                    const blob = new Blob(chunks, { type: "application/zip" });
                    const blobUrl = window.URL.createObjectURL(blob);

                    const link = document.createElement("a");
                    link.href = blobUrl;
                    link.download = "picfetch_indirilenler.zip";
                    document.body.appendChild(link);
                    link.click();

                    document.body.removeChild(link);
                    setTimeout(() => {
                        window.URL.revokeObjectURL(blobUrl);
                    }, 1000);

                    showToast("ZIP dosyası başarıyla indirildi!", "success");

                    // Başarılı indirme sonrasında durumları sıfırla
                    setIsDownloadingZip(false);
                    setDownloadProgress(0);
                    setIsIndeterminate(false);
                } catch (err) {
                    console.error("Toplu ZIP indirme hatası:", err);
                    setHasDownloadError(true);
                    setDownloadProgress(0);
                    showToast(`İndirme başarısız: ${err.message || "Bağlantı hatası"}`, "error");

                    // Hata durumunu kullanıcının fark etmesi için 3.5 saniye sonra progress bar'ı kaldır
                    setTimeout(() => {
                        setIsDownloadingZip(false);
                        setDownloadProgress(0);
                        setIsIndeterminate(false);
                        setHasDownloadError(false);
                    }, 3500);
                }
            };

            // Görsellerin tamamını seçen ya da seçimi kaldıran yardımcı fonksiyon
            const toggleSelectAll = () => {
                if (selectedImageIds.length === verifiedImages.length) {
                    setSelectedImageIds([]);
                } else {
                    setSelectedImageIds(verifiedImages.map(img => img.image_id));
                }
            };

            const verifiedImages = results.filter(item => item.is_verified);
            const discardedImages = results.filter(item => !item.is_verified);

            // Backend'e POST isteği yapıp ZIP indirmeyi ve ilerleme takibini yapan fonksiyon
            const handleDownloadZip = async () => {
                if (selectedImageIds.length === 0) {
                    showToast("Lütfen indirilecek en az bir görsel seçin.", "error");
                    return;
                }

                setIsDownloadingZip(true);
                setDownloadProgress(0);
                showToast(`${selectedImageIds.length} görsel indirilmek üzere ZIP paketi haline getiriliyor...`);

                try {
                    // Backend DownloadZipRequest payload yapısı
                    const payload = {
                        selectedImageIds: selectedImageIds,
                        images: results.map(img => ({
                            id: img.image_id,
                            url: img.original_url
                        }))
                    };

                    // Axios ile POST isteği atıp responseType'ı 'blob' ve ilerleme takibini yapıyoruz
                    const response = await axios.post(
                        "http://127.0.0.1:8000/api/v1/images/download-zip",
                        payload,
                        {
                            responseType: 'blob',
                            onDownloadProgress: (progressEvent) => {
                                if (progressEvent.total) {
                                    const percentCompleted = Math.round(
                                        (progressEvent.loaded * 100) / progressEvent.total
                                    );
                                    setDownloadProgress(percentCompleted);
                                } else {
                                    // Eğer response headers'da content-length yoksa yapay bir ilerleme gösterelim
                                    setDownloadProgress(prev => Math.min(prev + 10, 95));
                                }
                            }
                        }
                    );

                    // Axios responseType: 'blob' ayarı nedeniyle response.data zaten bir Blob nesnesidir.
                    // Ekstradan new Blob([]) içine sarmak bazı tarayıcılarda yapıyı bozabilir.
                    const blob = response.data;
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    const link = document.createElement("a");
                    link.href = blobUrl;
                    link.download = "secili_gorseller.zip";
                    document.body.appendChild(link);
                    link.click();
                    
                    // Tarayıcının dosyayı okumaya başlaması için DOM temizliğini ve URL iptalini
                    // setTimeout ile bir sonraki gecikmeye bırakıyoruz (anında iptal dosya bozulmasına yol açabilir).
                    document.body.removeChild(link);
                    setTimeout(() => {
                        window.URL.revokeObjectURL(blobUrl);
                    }, 1000);
                    
                    showToast("ZIP dosyası başarıyla indirildi!", "success");
                } catch (err) {
                    console.error("Toplu ZIP indirme hatası:", err);
                    showToast("ZIP indirilirken bir hata oluştu.", "error");
                } finally {

                    setDownloadProgress(0);
